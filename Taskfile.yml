version: "3"

tasks:
  generate:
    desc: Generate parser from grammar
    cmds:
      - npx tree-sitter-cli generate

  test:
    desc: Run tree-sitter tests
    cmds:
      - npx tree-sitter-cli test

  check:
    desc: Generate and test
    cmds:
      - task: generate
      - task: test

  docs:build:
    desc: Build documentation (markdown to HTML)
    cmds:
      - mkdir -p docs
      - task-plus md2html --file README.md --dst docs
      - task-plus md2html --file index.md --dst docs

  clean:
    desc: Remove generated files
    cmds:
      - rm -f docs/*.html
